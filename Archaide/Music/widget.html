<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Widget</title>
    <link rel="stylesheet" href="styless.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="spotify-widget">
        <div class="widget-header">
            <img src="./resources/image.png" alt="">
            <span>NOW PLAYING</span>
        </div>
        
        <div class="widget-content">
            <img src= alt="Album Art" class="album-art" id="album-art">
            <div class="track-info">
                <h4 class="track-title" id="track-title"></h4>
                <p class="track-artist" id="track-artist"></p>
            </div>
        </div>

        <div class="progress-container">
            <span class="time" id="current-time">0:00</span>
            <div class="progress-bar" id="progress-bar">
                <div class="progress" id="progress"></div>
            </div>
            <span class="time" id="total-time">3:45</span>
        </div>

        <div class="controls">
            <div class="playback-buttons">
                <button class="control-btn" id="shuffle"><i class="fas fa-random"></i></button>
                <button class="control-btn" id="prev"><i class="fas fa-step-backward"></i></button>
                <button class="control-btn play-btn" id="play-pause"><i class="fas fa-play"></i></button>
                <button class="control-btn" id="next"><i class="fas fa-step-forward"></i></button>
                <button class="control-btn" id="repeat"><i class="fas fa-redo"></i></button>
            </div>
            
            <div class="volume-container">
                <button class="control-btn" id="volume-icon"><i class="fas fa-volume-up"></i></button>
                <input type="range" id="volume-slider" min="0" max="100" value="70">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
